<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Acceio Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060810;--surface:#0d1117;--card:#111720;--border:rgba(255,255,255,.08);--accent:#00e5c3;--accent2:#6c63ff;--text:#edf2f7;--text2:#a0aec0;--muted:#4a5568;--danger:#fc8181;--success:#48bb78;--r:12px;--r-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.wrap{max-width:900px;margin:0 auto;padding:40px 20px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.2rem;}
.mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:grid;place-items:center;font-size:.8rem;font-weight:900;color:#000;}
h1{font-size:1rem;font-weight:700;color:var(--text2);}

/* Login */
#loginPanel{max-width:400px;margin:80px auto;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;}
.card h2{font-size:1.1rem;margin-bottom:20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:6px;}
.field input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-size:.88rem;outline:none;}
.field input:focus{border-color:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r-sm);border:none;font-weight:700;font-size:.83rem;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,195,.2);}
.btn-danger{background:rgba(252,129,129,.1);color:var(--danger);border:1px solid rgba(252,129,129,.2);}
.btn-danger:hover{background:rgba(252,129,129,.2);}
.btn-sm{padding:6px 12px;font-size:.75rem;}
.err{color:var(--danger);font-size:.8rem;margin-top:8px;}

/* Dashboard */
#adminPanel{display:none;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;}
.stat-val{font-size:1.8rem;font-weight:800;letter-spacing:-.04em;}
.stat-lbl{font-size:.72rem;color:var(--text2);margin-top:2px;}

.section-title{font-size:.95rem;font-weight:700;margin-bottom:14px;}
.users-table{width:100%;border-collapse:collapse;}
.users-table th{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;text-align:left;padding:0 12px 10px;border-bottom:1px solid var(--border);}
.users-table td{padding:12px;font-size:.82rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.users-table tr:last-child td{border-bottom:none;}
.plan-chip{font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:20px;}
.plan-Scale{background:rgba(0,229,195,.12);color:var(--accent);}
.plan-Growth{background:rgba(108,99,255,.12);color:var(--accent2);}
.plan-Starter{background:rgba(160,174,192,.1);color:var(--text2);}
.active-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;}
.dot-on{background:var(--success);} .dot-off{background:var(--danger);}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;place-items:center;}
.modal-overlay.show{display:grid;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:440px;max-width:90vw;}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:20px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:var(--r-sm);cursor:pointer;font-size:.82rem;font-weight:600;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
select.field-sel{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-size:.88rem;outline:none;}
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN -->
  <div id="loginPanel">
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo" style="justify-content:center;margin-bottom:6px"><div class="mark">A</div>Acceio Admin</div>
      <div style="font-size:.82rem;color:var(--text2)">Manage customer accounts</div>
    </div>
    <div class="card">
      <h2>Sign In</h2>
      <div class="field"><label>Username</label><input id="aUser" type="text" placeholder="admin"/></div>
      <div class="field"><label>Password</label><input id="aPass" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" onclick="adminLogin()">Sign In →</button>
      <div class="err" id="aErr"></div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <div class="header">
      <div class="logo"><div class="mark">A</div>Acceio Admin</div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Customer</button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total Customers</div></div>
      <div class="stat"><div class="stat-val" id="statActive" style="color:var(--success)">—</div><div class="stat-lbl">Active</div></div>
      <div class="stat"><div class="stat-val" id="statScale" style="color:var(--accent)">—</div><div class="stat-lbl">Scale Plan</div></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="section-title">Customer Accounts</div>
        <button class="btn btn-ghost btn-sm" onclick="loadUsers()">↻ Refresh</button>
      </div>
      <table class="users-table">
        <thead><tr><th>Name</th><th>Username</th><th>Plan</th><th>Company</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add New Customer</h3>
    <input type="hidden" id="editUserId"/>
    <div class="row-2">
      <div class="field"><label>Full Name *</label><input id="fName" placeholder="Rajesh Singh"/></div>
      <div class="field"><label>Company</label><input id="fCompany" placeholder="Acme Corp"/></div>
    </div>
    <div class="row-2">
      <div class="field"><label>Username *</label><input id="fUser" placeholder="rajesh_acme"/></div>
      <div class="field"><label>Password *</label><input id="fPass" type="password" placeholder="min 8 chars"/></div>
    </div>
    <div class="row-2">
      <div class="field"><label>Email</label><input id="fEmail" type="email" placeholder="rajesh@acme.com"/></div>
      <div class="field"><label>Plan</label>
        <select class="field-sel" id="fPlan">
          <option>Starter</option><option>Growth</option><option>Scale</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save Customer</button>
    </div>
    <div class="err" id="modalErr"></div>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://YOUR-BACKEND-URL.onrender.com';
let token = localStorage.getItem('acceio_admin_token');
if(token) showAdmin();

async function adminLogin(){
  const u = document.getElementById('aUser').value.trim();
  const p = document.getElementById('aPass').value;
  try {
    const res = await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error);
    if(data.user.plan !== 'Scale' && data.user.username !== 'admin') throw new Error('Admin access required');
    token = data.token;
    localStorage.setItem('acceio_admin_token', token);
    showAdmin();
  } catch(e){ document.getElementById('aErr').textContent = e.message; }
}

function showAdmin(){
  document.getElementById('loginPanel').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadUsers();
}
function logout(){ localStorage.removeItem('acceio_admin_token'); location.reload(); }

async function loadUsers(){
  try {
    const res = await fetch(`${API}/api/admin/users`,{headers:{'Authorization':'Bearer '+token}});
    const users = await res.json();
    document.getElementById('statTotal').textContent = users.length;
    document.getElementById('statActive').textContent = users.filter(u=>u.is_active).length;
    document.getElementById('statScale').textContent = users.filter(u=>u.plan==='Scale').length;

    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = users.map(u=>`
      <tr>
        <td style="font-weight:600">${u.name}</td>
        <td style="color:var(--text2)">${u.username}</td>
        <td><span class="plan-chip plan-${u.plan}">${u.plan}</span></td>
        <td style="color:var(--text2)">${u.company||'—'}</td>
        <td><span class="active-dot ${u.is_active?'dot-on':'dot-off'}"></span>${u.is_active?'Active':'Inactive'}</td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="editUser(${JSON.stringify(u).replace(/"/g,'&quot;')})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deactivateUser(${u.id},'${u.name}')">${u.is_active?'Deactivate':'Activate'}</button>
        </td>
      </tr>`).join('');
  } catch(e){ alert('Error loading users: '+e.message); }
}

function openModal(){
  document.getElementById('modalTitle').textContent = 'Add New Customer';
  document.getElementById('editUserId').value = '';
  ['fName','fUser','fPass','fEmail','fCompany'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPlan').value = 'Starter';
  document.getElementById('modalErr').textContent = '';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

function editUser(u){
  document.getElementById('modalTitle').textContent = 'Edit Customer';
  document.getElementById('editUserId').value = u.id;
  document.getElementById('fName').value = u.name||'';
  document.getElementById('fUser').value = u.username||'';
  document.getElementById('fPass').value = '';
  document.getElementById('fEmail').value = u.email||'';
  document.getElementById('fCompany').value = u.company||'';
  document.getElementById('fPlan').value = u.plan||'Starter';
  document.getElementById('modalErr').textContent = '';
  document.getElementById('modalOverlay').classList.add('show');
}

async function saveUser(){
  const id = document.getElementById('editUserId').value;
  const body = {
    name: document.getElementById('fName').value.trim(),
    username: document.getElementById('fUser').value.trim().toLowerCase(),
    password: document.getElementById('fPass').value,
    email: document.getElementById('fEmail').value.trim(),
    company: document.getElementById('fCompany').value.trim(),
    plan: document.getElementById('fPlan').value,
  };
  if(!body.name || !body.username) { document.getElementById('modalErr').textContent='Name and username required'; return; }
  if(!id && !body.password) { document.getElementById('modalErr').textContent='Password required for new users'; return; }
  try {
    const url = id ? `${API}/api/admin/users/${id}` : `${API}/api/admin/users`;
    const method = id ? 'PUT' : 'POST';
    if(id && !body.password) delete body.password;
    const res = await fetch(url,{method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error);
    closeModal();
    loadUsers();
  } catch(e){ document.getElementById('modalErr').textContent = e.message; }
}

async function deactivateUser(id, name){
  if(!confirm(`${name.includes('Active')?'Deactivate':'Toggle'} user ${name}?`)) return;
  const user = (await (await fetch(`${API}/api/admin/users`,{headers:{'Authorization':'Bearer '+token}})).json()).find(u=>u.id===id);
  await fetch(`${API}/api/admin/users/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({is_active: user.is_active ? 0 : 1})});
  loadUsers();
}
</script>
</body>
</html>
